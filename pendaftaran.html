<section class="section">

<h2>Form Pendaftaran Kursus Menulis</h2>

<form>

<label>Nama Lengkap</label><br>
<input type="text" name="nama" required><br><br>

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<label>Password</label><br>
<input type="password" name="password" required><br><br>

<label>Tanggal Lahir</label><br>
<input type="date" name="tanggal"><br><br>

<label>Pilih Kelas</label><br>
<input type="radio" name="kelas" value="Jurnalistik"> Jurnalistik<br>
<input type="radio" name="kelas" value="Artikel"> Artikel<br><br>

<input type="checkbox" required> Saya setuju dengan syarat dan ketentuan<br><br>

<label>Kota</label><br>
<select name="kota">
<option>Palembang</option>
<option>Jakarta</option>
<option>Bandung</option>
<option>Surabaya</option>
</select><br><br>

<label>Pesan</label><br>
<textarea rows="4" name="pesan"></textarea><br><br>

<button type="submit">Daftar</button>
<button type="reset">Reset</button>

</form>

</section>
